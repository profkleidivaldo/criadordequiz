<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎮 Criador de Quiz Divertido!</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --yellow: #FFD60A;
      --orange: #FF6B2B;
      --purple: #7C3AED;
      --purple-light: #EDE9FE;
      --green: #10B981;
      --blue: #3B82F6;
      --pink: #EC4899;
      --red: #EF4444;
      --bg: #FFF9F0;
      --card: #FFFFFF;
      --text: #1E1B4B;
      --muted: #6B7280;
      --border: #E5E7EB;
      --shadow: 0 8px 30px rgba(124,58,237,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background bubbles */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,214,10,0.2) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(124,58,237,0.15) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(255,107,43,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      padding: 30px 20px;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: bounceIn .6s ease;
    }

    .header-badge {
      display: inline-block;
      background: var(--yellow);
      color: var(--text);
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      padding: 4px 14px;
      border-radius: 99px;
      margin-bottom: 10px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.15);
      letter-spacing: 1px;
    }

    .header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(28px, 5vw, 48px);
      color: var(--purple);
      line-height: 1.1;
      text-shadow: 4px 4px 0 rgba(124,58,237,0.2);
    }

    .header h1 span { color: var(--orange); }

    .header p {
      color: var(--muted);
      font-size: 15px;
      margin-top: 8px;
      font-weight: 600;
    }

    /* LAYOUT */
    .layout {
      max-width: 900px;
      margin: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 700px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* CARD */
    .card {
      background: var(--card);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow);
      border: 2px solid transparent;
      transition: border .2s;
    }

    .card:hover { border-color: var(--purple-light); }

    .card-title {
      font-family: 'Fredoka One', cursive;
      font-size: 20px;
      color: var(--purple);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .card-title .icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    /* FORM */
    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-weight: 800;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      background: #FAFAFA;
      transition: border .2s, box-shadow .2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
      background: #FFF;
    }

    /* Image upload area */
    .img-upload-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #FAFAFA;
      transition: border .2s;
    }

    .img-upload-area:hover { border-color: var(--purple); }

    .img-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }

    .img-tab {
      flex: 1;
      padding: 6px;
      border-radius: 8px;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 12px;
      border: 2px solid var(--border);
      background: white;
      cursor: pointer;
      color: var(--muted);
      transition: all .2s;
    }

    .img-tab.active {
      background: var(--purple);
      border-color: var(--purple);
      color: white;
    }

    .img-panel { display: none; }
    .img-panel.active { display: block; }

    .file-upload-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border: 2px dashed var(--purple);
      border-radius: 10px;
      background: var(--purple-light);
      color: var(--purple);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: all .2s;
    }

    .file-upload-btn:hover { background: var(--purple); color: white; }

    #fileInput { display: none; }

    .img-preview {
      margin-top: 10px;
      border-radius: 10px;
      overflow: hidden;
      max-height: 120px;
      display: none;
    }

    .img-preview img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    /* Option rows */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .option-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .option-letter {
      width: 28px; height: 28px;
      border-radius: 8px;
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      color: white;
    }

    .opt-a { background: #3B82F6; }
    .opt-b { background: #EC4899; }
    .opt-c { background: #F59E0B; }
    .opt-d { background: #10B981; }

    .option-item input {
      flex: 1;
      padding: 8px 12px !important;
    }

    /* Correct answer select */
    .correct-select {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .correct-option {
      padding: 8px;
      border-radius: 10px;
      border: 2px solid var(--border);
      text-align: center;
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s;
      background: white;
      color: var(--muted);
    }

    .correct-option.selected {
      border-color: var(--green);
      background: #D1FAE5;
      color: #065F46;
    }

    /* ADD BUTTON */
    .btn-add {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--purple) 0%, #A855F7 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      cursor: pointer;
      margin-top: 8px;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 15px rgba(124,58,237,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124,58,237,0.5);
    }

    .btn-add:active { transform: translateY(0); }

    /* QUESTIONS LIST */
    .questions-panel { position: sticky; top: 20px; }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 10px; }
    .empty-state p { font-weight: 700; font-size: 15px; }

    .questions-list { display: flex; flex-direction: column; gap: 10px; max-height: 420px; overflow-y: auto; padding-right: 4px; }

    .questions-list::-webkit-scrollbar { width: 6px; }
    .questions-list::-webkit-scrollbar-track { background: transparent; }
    .questions-list::-webkit-scrollbar-thumb { background: var(--purple-light); border-radius: 99px; }

    .q-item {
      background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 100%);
      border: 2px solid var(--purple-light);
      border-radius: 14px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideIn .3s ease;
      position: relative;
    }

    .q-number {
      width: 36px; height: 36px;
      background: var(--purple);
      color: white;
      border-radius: 10px;
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .q-info { flex: 1; min-width: 0; }
    .q-title { font-weight: 800; font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .q-sub { font-size: 12px; color: var(--muted); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .q-thumb {
      width: 40px; height: 40px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .q-delete {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      opacity: .5;
      transition: opacity .2s;
      flex-shrink: 0;
      padding: 4px;
      margin-top: 0;
    }

    .q-delete:hover { opacity: 1; }

    /* STATS BAR */
    .stats-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      flex: 1;
      background: linear-gradient(135deg, var(--yellow) 0%, var(--orange) 100%);
      color: white;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }

    .stat-num {
      font-family: 'Fredoka One', cursive;
      font-size: 24px;
      line-height: 1;
    }

    .stat-lbl { font-size: 11px; font-weight: 700; opacity: .9; }

    /* DOWNLOAD BUTTON */
    .btn-download {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--green) 0%, #059669 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      cursor: pointer;
      margin-top: 14px;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 15px rgba(16,185,129,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-download:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(16,185,129,0.5);
    }

    .btn-download:disabled {
      background: var(--border);
      color: var(--muted);
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 99px;
      font-weight: 700;
      font-size: 14px;
      z-index: 999;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      pointer-events: none;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    /* ANIMATIONS */
    @keyframes bounceIn {
      0% { opacity: 0; transform: scale(.8) translateY(-20px); }
      70% { transform: scale(1.05) translateY(0); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Stars decoration */
    .deco {
      position: fixed;
      pointer-events: none;
      font-size: 24px;
      opacity: .15;
      animation: float 6s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-20px) rotate(15deg); }
    }
  </style>
</head>
<body>

<!-- Decorations -->
<div class="deco" style="top:8%;left:3%;animation-delay:0s">⭐</div>
<div class="deco" style="top:20%;right:4%;animation-delay:1s">🌟</div>
<div class="deco" style="top:65%;left:2%;animation-delay:2s">✨</div>
<div class="deco" style="top:80%;right:3%;animation-delay:3s">🎯</div>
<div class="deco" style="top:45%;right:2%;animation-delay:1.5s">📚</div>

<div class="page-wrapper">

  <header class="header">
    <div class="header-badge">🏫 ENSINO FUNDAMENTAL</div>
    <h1>Crie seu <span>Quiz</span> Divertido! 🎮</h1>
    <p>Adicione perguntas e baixe um quiz interativo para seus alunos</p>
  </header>

  <div class="layout">

    <!-- FORM CARD -->
    <div class="card">
      <div class="card-title">
        <div class="icon" style="background:#EDE9FE">✏️</div>
        Nova Pergunta
      </div>

      <!-- Enunciado -->
      <div class="form-group">
        <label>📋 Enunciado</label>
        <input type="text" id="enunciado" placeholder="Ex: Leia o texto abaixo e responda...">
      </div>

      <!-- Image upload -->
      <div class="form-group">
        <label>🖼️ Imagem (opcional)</label>
        <div class="img-upload-area">
          <div class="img-tabs">
            <button class="img-tab active" onclick="switchTab('url')">🔗 URL</button>
            <button class="img-tab" onclick="switchTab('file')">💾 Computador</button>
          </div>

          <div class="img-panel active" id="panel-url">
            <input type="text" id="imageUrl" placeholder="https://..." style="border-radius:10px;border:2px solid #e5e7eb;padding:8px 12px;width:100%;font-family:'Nunito',sans-serif;font-size:13px;outline:none;" oninput="previewFromUrl(this.value)">
          </div>

          <div class="img-panel" id="panel-file">
            <label class="file-upload-btn" for="fileInput">
              📂 Escolher imagem do computador
            </label>
            <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
          </div>

          <div class="img-preview" id="imgPreview">
            <img id="previewImg" src="" alt="Preview">
          </div>
        </div>
      </div>

      <!-- Pergunta -->
      <div class="form-group">
        <label>❓ Pergunta</label>
        <input type="text" id="pergunta" placeholder="Ex: Qual é a capital do Brasil?">
      </div>

      <!-- Alternativas -->
      <div class="form-group">
        <label>📝 Alternativas</label>
        <div class="options-grid">
          <div class="option-item">
            <div class="option-letter opt-a">A</div>
            <input type="text" id="opt1" placeholder="Alternativa A">
          </div>
          <div class="option-item">
            <div class="option-letter opt-b">B</div>
            <input type="text" id="opt2" placeholder="Alternativa B">
          </div>
          <div class="option-item">
            <div class="option-letter opt-c">C</div>
            <input type="text" id="opt3" placeholder="Alternativa C">
          </div>
          <div class="option-item">
            <div class="option-letter opt-d">D</div>
            <input type="text" id="opt4" placeholder="Alternativa D">
          </div>
        </div>
      </div>

      <!-- Resposta correta -->
      <div class="form-group">
        <label>✅ Resposta Correta</label>
        <div class="correct-select" id="correctSelect">
          <div class="correct-option" onclick="selectCorrect(0)" data-val="0" style="background:#EFF6FF;border-color:#3B82F6;color:#1D4ED8">A</div>
          <div class="correct-option" onclick="selectCorrect(1)" data-val="1" style="background:#FDF2F8;border-color:#EC4899;color:#9D174D">B</div>
          <div class="correct-option" onclick="selectCorrect(2)" data-val="2" style="background:#FFFBEB;border-color:#F59E0B;color:#92400E">C</div>
          <div class="correct-option" onclick="selectCorrect(3)" data-val="3" style="background:#ECFDF5;border-color:#10B981;color:#065F46">D</div>
        </div>
      </div>

      <input type="hidden" id="correctAnswer" value="0">

      <button class="btn-add" onclick="addQuestion()">
        ➕ Adicionar Pergunta
      </button>
    </div>

    <!-- RIGHT PANEL -->
    <div class="questions-panel">
      <div class="card">
        <div class="stats-bar">
          <div class="stat">
            <div class="stat-num" id="qCount">0</div>
            <div class="stat-lbl">Perguntas</div>
          </div>
        </div>

        <div class="card-title">
          <div class="icon" style="background:#FEF3C7">📋</div>
          Perguntas Adicionadas
        </div>

        <div id="emptyState" class="empty-state">
          <span class="emoji">🤔</span>
          <p>Nenhuma pergunta ainda!</p>
          <p style="font-size:13px;margin-top:4px;font-weight:600">Preencha o formulário ao lado</p>
        </div>

        <div class="questions-list" id="questionsList"></div>

        <button class="btn-download" id="downloadBtn" onclick="downloadQuiz()" disabled>
          ⬇️ Baixar Quiz Completo
        </button>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  let questions = [];
  let currentImage = '';
  let activeTab = 'url';

  // --- Tabs ---
  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.img-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'url') || (i === 1 && tab === 'file'));
    });
    document.getElementById('panel-url').classList.toggle('active', tab === 'url');
    document.getElementById('panel-file').classList.toggle('active', tab === 'file');

    if (tab === 'url') {
      currentImage = document.getElementById('imageUrl').value.trim();
      previewFromUrl(currentImage);
    }
  }

  function previewFromUrl(url) {
    currentImage = url;
    showPreview(url);
  }

  function handleFileUpload(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(ev) {
      currentImage = ev.target.result; // base64
      showPreview(currentImage);
    };
    reader.readAsDataURL(file);
  }

  function showPreview(src) {
    const previewDiv = document.getElementById('imgPreview');
    const previewImg = document.getElementById('previewImg');

    if (src && src.length > 5) {
      previewImg.src = src;
      previewDiv.style.display = 'block';
    } else {
      previewDiv.style.display = 'none';
    }
  }

  // --- Correct answer ---
  function selectCorrect(val) {
    document.querySelectorAll('.correct-option').forEach(el => {
      el.classList.remove('selected');
    });
    document.querySelector(`.correct-option[data-val="${val}"]`).classList.add('selected');
    document.getElementById('correctAnswer').value = val;
  }

  // init first as selected
  document.querySelector('.correct-option[data-val="0"]').classList.add('selected');

  // --- Add question ---
  function addQuestion() {
    const enunciado = document.getElementById('enunciado').value.trim();
    const pergunta  = document.getElementById('pergunta').value.trim();
    const choices   = [
      document.getElementById('opt1').value.trim(),
      document.getElementById('opt2').value.trim(),
      document.getElementById('opt3').value.trim(),
      document.getElementById('opt4').value.trim(),
    ];

    if (!enunciado || !pergunta || choices.some(c => !c)) {
      showToast('⚠️ Preencha todos os campos!', 'error');
      return;
    }

    const q = {
      enunciado,
      image: currentImage,
      question: pergunta,
      choices,
      answer: Number(document.getElementById('correctAnswer').value)
    };

    questions.push(q);
    renderList();
    resetForm();
    showToast('✅ Pergunta adicionada!', 'success');
  }

  function resetForm() {
    document.getElementById('enunciado').value = '';
    document.getElementById('pergunta').value = '';
    ['opt1','opt2','opt3','opt4'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('imageUrl').value = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('imgPreview').style.display = 'none';
    currentImage = '';
    selectCorrect(0);
  }

  function deleteQuestion(index) {
    questions.splice(index, 1);
    renderList();
  }

  function renderList() {
    const list  = document.getElementById('questionsList');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('qCount');
    const dlBtn = document.getElementById('downloadBtn');

    count.textContent = questions.length;
    dlBtn.disabled = questions.length === 0;
    empty.style.display = questions.length === 0 ? 'block' : 'none';
    list.innerHTML = '';

    questions.forEach((q, i) => {
      const letters = ['A','B','C','D'];
      const item = document.createElement('div');
      item.className = 'q-item';
      item.innerHTML = `
        <div class="q-number">${i + 1}</div>
        ${q.image ? `<img src="${q.image}" class="q-thumb">` : ''}
        <div class="q-info">
          <div class="q-title">${q.enunciado}</div>
          <div class="q-sub">✅ Correta: ${letters[q.answer]} — ${q.choices[q.answer]}</div>
        </div>
        <button class="q-delete" onclick="deleteQuestion(${i})" title="Remover">🗑️</button>
      `;
      list.appendChild(item);
    });
  }

  // --- Toast ---
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
    setTimeout(() => t.classList.add('show'), 10);
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // --- Download ---
  function downloadQuiz() {
    if (questions.length === 0) return;
    const html = buildQuizHTML();
    const blob = new Blob([html], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = 'meu-quiz.html';
    a.click();
    URL.revokeObjectURL(url);
    showToast('🎉 Quiz baixado com sucesso!', 'success');
  }

  function buildQuizHTML() {
    return `<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎮 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--purple:#7C3AED;--purple-light:#EDE9FE;--green:#10B981;--red:#EF4444;--yellow:#FFD60A;--orange:#FF6B2B;--blue:#3B82F6;--pink:#EC4899;--amber:#F59E0B;--bg:#FFF9F0;--card:#ffffff;--text:#1E1B4B;--muted:#6B7280;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 10% 20%,rgba(255,214,10,.2) 0%,transparent 40%),radial-gradient(circle at 90% 80%,rgba(124,58,237,.15) 0%,transparent 40%);pointer-events:none;z-index:0;}
.card{position:relative;z-index:1;background:var(--card);border-radius:24px;padding:30px;box-shadow:0 8px 40px rgba(124,58,237,.18);width:100%;max-width:680px;margin-top:20px;}
h1{font-family:'Fredoka One',cursive;font-size:clamp(24px,4vw,36px);color:var(--purple);text-align:center;margin-bottom:6px;}
.subtitle{text-align:center;color:var(--muted);font-weight:700;font-size:14px;margin-bottom:24px;}
/* Progress */
.progress-wrap{margin-bottom:24px;}
.progress-info{display:flex;justify-content:space-between;font-weight:800;font-size:13px;color:var(--muted);margin-bottom:6px;}
.progress-bar{height:12px;background:#E5E7EB;border-radius:99px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:99px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}
/* Question */
.q-badge{display:inline-block;background:var(--purple-light);color:var(--purple);font-family:'Fredoka One',cursive;font-size:13px;padding:3px 12px;border-radius:99px;margin-bottom:10px;}
.enunciado{font-size:16px;font-weight:800;color:var(--text);margin-bottom:6px;line-height:1.4;}
.q-text{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px;line-height:1.4;}
.q-img-wrap{width:100%;margin-bottom:16px;border-radius:14px;overflow:hidden;background:#f3f4f6;display:flex;justify-content:center;align-items:center;}
.q-img{width:100%;height:auto;max-height:60vw;object-fit:contain;display:block;border-radius:14px;}
@media(min-width:600px){.q-img{max-height:340px;}}
@media(min-width:900px){.q-img{max-height:420px;}}
/* Options */
.options{display:grid;gap:10px;}
.option-btn{padding:14px 16px;border:2px solid #E5E7EB;border-radius:14px;background:white;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;color:var(--text);display:flex;align-items:center;gap:12px;text-align:left;transition:all .2s;}
.option-btn:not(.locked):hover{border-color:var(--purple);background:var(--purple-light);transform:translateX(4px);}
.option-letter{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-family:'Fredoka One',cursive;font-size:15px;flex-shrink:0;color:white;}
.la{background:var(--blue);} .lb{background:var(--pink);} .lc{background:var(--amber);} .ld{background:var(--green);}
.option-btn.correct{border-color:var(--green)!important;background:#D1FAE5!important;color:#065F46!important;}
.option-btn.wrong{border-color:var(--red)!important;background:#FEE2E2!important;color:#7F1D1D!important;}
.option-btn.locked{pointer-events:none;}
/* Feedback */
.feedback{margin-top:16px;padding:14px 18px;border-radius:14px;font-weight:800;font-size:15px;display:none;align-items:center;gap:10px;}
.feedback.show{display:flex;}
.feedback.ok{background:#D1FAE5;color:#065F46;border:2px solid var(--green);}
.feedback.nope{background:#FEE2E2;color:#7F1D1D;border:2px solid var(--red);}
/* Controls */
#controls{display:flex;justify-content:center;margin-top:20px;}
.btn-next{padding:14px 36px;background:linear-gradient(135deg,var(--purple) 0%,#A855F7 100%);color:white;border:none;border-radius:14px;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;box-shadow:0 4px 15px rgba(124,58,237,.4);transition:transform .15s,box-shadow .15s;display:none;}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(124,58,237,.5);}
.btn-next.visible{display:block;}
/* Result */
.result{text-align:center;}
.result-emoji{font-size:72px;display:block;margin-bottom:12px;animation:bounceIn .6s ease;}
.result h2{font-family:'Fredoka One',cursive;font-size:clamp(22px,4vw,34px);color:var(--purple);margin-bottom:8px;}
.result-score{font-family:'Fredoka One',cursive;font-size:48px;color:var(--orange);margin:10px 0;}
.result p{color:var(--muted);font-weight:700;font-size:15px;}
.btn-restart{padding:14px 30px;background:linear-gradient(135deg,var(--green) 0%,#059669 100%);color:white;border:none;border-radius:14px;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;box-shadow:0 4px 15px rgba(16,185,129,.4);margin-top:20px;transition:transform .15s;}
.btn-restart:hover{transform:translateY(-2px);}
.stars{font-size:32px;margin:8px 0;}
@keyframes bounceIn{0%{opacity:0;transform:scale(.5)}70%{transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}
</style>
</head>
<body>
<div class="card">
  <h1>🎮 Quiz!</h1>
  <p class="subtitle">Responda as perguntas com atenção 🧠</p>
  <div class="progress-wrap">
    <div class="progress-info">
      <span id="qLabel">Pergunta 1</span>
      <span id="qFrac"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
  <section id="quizArea"></section>
  <div id="controls">
    <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Próxima ➡️</button>
  </div>
</div>

<script>
const questions=${JSON.stringify(questions)};
let current=0,score=0,answered=false;
const letters=['A','B','C','D'];
const letterClasses=['la','lb','lc','ld'];

function render(){
  answered=false;
  const q=questions[current];
  const pct=Math.round((current/questions.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('qLabel').textContent='Pergunta '+(current+1);
  document.getElementById('qFrac').textContent=(current+1)+' / '+questions.length;
  document.getElementById('nextBtn').classList.remove('visible');

  let html='<div class="q-badge">❓ Pergunta '+(current+1)+'</div>';
  html+='<div class="enunciado">'+q.enunciado+'</div>';
  html+='<div class="q-text">'+q.question+'</div>';
  if(q.image) html+='<div class="q-img-wrap"><img src="'+q.image+'" class="q-img"></div>';
  html+='<div class="options">';
  q.choices.forEach((c,i)=>{
    html+='<button class="option-btn" id="opt'+i+'" onclick="pick('+i+')"><span class="option-letter '+letterClasses[i]+'">'+letters[i]+'</span>'+c+'</button>';
  });
  html+='</div>';
  html+='<div class="feedback" id="feedback"></div>';
  document.getElementById('quizArea').innerHTML=html;
}

function pick(idx){
  if(answered)return;
  answered=true;
  const q=questions[current];
  const btns=document.querySelectorAll('.option-btn');
  btns.forEach(b=>b.classList.add('locked'));
  const fb=document.getElementById('feedback');

  if(idx===q.answer){
    score++;
    document.getElementById('opt'+idx).classList.add('correct');
    fb.innerHTML='🎉 Muito bem! Você acertou!';
    fb.className='feedback ok show';
  } else {
    document.getElementById('opt'+idx).classList.add('wrong');
    document.getElementById('opt'+q.answer).classList.add('correct');
    fb.innerHTML='😅 Não foi dessa vez! A correta era a '+letters[q.answer]+'.';
    fb.className='feedback nope show';
  }

  const nextBtn=document.getElementById('nextBtn');
  if(current+1<questions.length){
    nextBtn.textContent='Próxima ➡️';
  } else {
    nextBtn.textContent='Ver Resultado 🏆';
  }
  nextBtn.classList.add('visible');
}

function nextQuestion(){
  current++;
  if(current>=questions.length){ showResult(); return; }
  render();
}

function showResult(){
  const pct=Math.round((score/questions.length)*100);
  let emoji='😅';
  let msg='Continue praticando! Você vai melhorar!';
  let stars='⭐';
  if(pct>=80){ emoji='🏆'; msg='Parabéns! Você foi incrível!'; stars='⭐⭐⭐'; }
  else if(pct>=50){ emoji='🎯'; msg='Bom trabalho! Continue estudando!'; stars='⭐⭐'; }

  document.getElementById('quizArea').innerHTML=\`
    <div class="result">
      <span class="result-emoji">\${emoji}</span>
      <h2>Quiz Concluído!</h2>
      <div class="stars">\${stars}</div>
      <div class="result-score">\${score}/\${questions.length}</div>
      <p>\${msg}</p>
      <button class="btn-restart" onclick="restart()">🔄 Tentar Novamente</button>
    </div>
  \`;
  document.getElementById('controls').style.display='none';
  document.getElementById('progressFill').style.width='100%';
}

function restart(){
  current=0; score=0;
  document.getElementById('controls').style.display='flex';
  render();
}

render();
<\/script>
</body>
</html>`;
  }
</script>

</body>
</html>
